name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm run typecheck

      - name: Unit tests — api-server business logic
        run: pnpm --filter @workspace/api-server run test

      - name: Build — api-server
        run: pnpm --filter @workspace/api-server run build
        env:
          PORT: 8080

      - name: Build — growth-os frontend
        run: pnpm --filter @workspace/growth-os run build
        env:
          PORT: 3000
          BASE_PATH: /

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build growth-os frontend (static files for nginx)
        run: pnpm --filter @workspace/growth-os run build
        env:
          PORT: 3000
          BASE_PATH: /

      # ── Backend stack via Docker Compose ─────────────────────────────────
      # docker-compose.yml (Task #306) builds the api image from the repo
      # Dockerfile and starts postgres + api as a health-checked pair.
      # We skip backup-worker because it requires GCS credentials not needed
      # for functional E2E testing.
      - name: Build and start backend stack via Docker Compose
        env:
          # postgres container password — must match the api service's PGPASSWORD
          PGPASSWORD: changeme
          # SESSION_SECRET must be ≥ 32 chars; github.sha is 40 hex chars
          SESSION_SECRET: "${{ github.sha }}-ci-ringside-secret"
          # Bootstrap admin account — must match the playwright global-setup
          # dev-fallback credentials (rahul.sharma@manipalgroup.info / Ringside@123)
          # so tests can log in without requiring TEST_EMAIL / TEST_PASSWORD overrides.
          BOOTSTRAP_ADMIN_EMAIL: rahul.sharma@manipalgroup.info
          BOOTSTRAP_ADMIN_PASSWORD: "Ringside@123"
        run: docker compose up --build -d postgres api

      - name: Wait for API readiness (migrations complete + DB reachable)
        run: |
          echo "Waiting for /api/readyz to return 200..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/readyz || true)
            if [ "$STATUS" = "200" ]; then
              echo "API ready after attempt $i."
              break
            fi
            echo "  attempt $i: HTTP $STATUS — retrying in 5s"
            sleep 5
          done
          # Hard fail if API never became ready
          curl -fs http://localhost:8080/api/readyz \
            || { echo "ERROR: API did not become ready after 5 minutes"; docker compose logs api; exit 1; }

      # ── nginx reverse proxy ───────────────────────────────────────────────
      # Routes /api → Docker api container on host port 8080
      # Routes /    → built growth-os static files (dist/public)
      # This mirrors the Replit shared proxy and lets Playwright use baseURL=http://localhost:80
      - name: Configure nginx reverse proxy
        run: |
          # Copy the Vite output to /tmp so nginx's www-data worker can read
          # the files without needing to traverse /home/runner (which may be
          # mode 700 and block the www-data user).
          STATIC=/tmp/ringside-dist
          sudo mkdir -p "$STATIC"
          sudo cp -r "$GITHUB_WORKSPACE/artifacts/growth-os/dist/public/." "$STATIC/"
          printf 'server {\n  listen 80;\n  location /api {\n    proxy_pass http://localhost:8080;\n    proxy_set_header Host $http_host;\n    proxy_set_header X-Real-IP $remote_addr;\n  }\n  location / {\n    root %s;\n    try_files $uri $uri/ /index.html;\n  }\n}\n' \
            "$STATIC" \
            | sudo tee /etc/nginx/sites-available/ringside > /dev/null
          sudo ln -sf /etc/nginx/sites-available/ringside /etc/nginx/sites-enabled/ringside
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t
          sudo systemctl restart nginx
          # Sanity check 1: proxy reaches the API health endpoint
          curl -fs http://localhost:80/api/healthz \
            || { echo "ERROR: nginx proxy to /api not working"; exit 1; }
          # Sanity check 2: SPA try_files fallback works for a non-root React route
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/pipeline)
          [ "$STATUS" = "200" ] \
            || { echo "ERROR: nginx SPA try_files returned HTTP $STATUS for /pipeline (expected 200)"; exit 1; }

      # ── Seed CI test data ─────────────────────────────────────────────────
      # The E2E suite uses SAMPLE_TARGET_ID=4 for Target Detail tab tests.
      # The Docker DB is empty on every run, so we create 4 minimal targets
      # here; PostgreSQL serial assigns IDs 1-4 in insertion order.
      - name: Seed CI test data (4 targets for Target Detail tests)
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:80/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"rahul.sharma@manipalgroup.info","password":"Ringside@123"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          for i in 1 2 3 4; do
            CODE=$(printf "TGT-%03d" "$i")
            curl -sf -X POST http://localhost:80/api/targets \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $TOKEN" \
              -d "{\"targetCode\":\"$CODE\",\"projectName\":\"CI Target $i\",\"priorityTier\":\"Priority 1\"}" \
              > /dev/null
          done
          echo "Seeded 4 CI test targets (IDs 1–4)."

      - name: Install Playwright browsers (Chromium + system deps)
        run: pnpm --filter @workspace/tests run install:browsers

      - name: Run E2E tests
        run: pnpm --filter @workspace/tests run test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7

      - name: Print Docker Compose logs on failure
        if: failure()
        run: docker compose logs api postgres
