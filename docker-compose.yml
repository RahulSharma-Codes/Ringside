# Ringside — local development stack
# Prerequisites: Docker Desktop (or Docker Engine + Compose v2)
#
# Quick start:
#   cp .env.example .env          # fill in SESSION_SECRET and PGPASSWORD at minimum
#   docker compose up --build
#
# The API server starts on http://localhost:8080.
# Postgres data is persisted in the `postgres_data` volume.
#
# Note on the backup-worker: it uses Replit's GCS token sidecar in production.
# Outside Replit, set GOOGLE_APPLICATION_CREDENTIALS in .env to a service account
# key file, or ignore the backup error logs — the worker retries every 6 hours.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ringside
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGPASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      NODE_ENV: production
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: ${PGPASSWORD:-changeme}
      PGDATABASE: ringside
      SESSION_SECRET: ${SESSION_SECRET:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      SENTRY_DSN: ${SENTRY_DSN:-}
      REPLIT_DOMAINS: ${REPLIT_DOMAINS:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "8080:8080"
    restart: unless-stopped

  backup-worker:
    build:
      context: .
      dockerfile: artifacts/backup-worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: ${PGPASSWORD:-changeme}
      PGDATABASE: ringside
      DEFAULT_OBJECT_STORAGE_BUCKET_ID: ${DEFAULT_OBJECT_STORAGE_BUCKET_ID:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    restart: unless-stopped

volumes:
  postgres_data:
