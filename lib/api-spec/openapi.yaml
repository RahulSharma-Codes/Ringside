openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Inorganic Growth OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: targets
    description: Deal target operations
  - name: interactions
    description: Interaction log operations
  - name: actions
    description: Action item operations
  - name: dashboard
    description: Dashboard and analytics
  - name: import
    description: CSV / Excel bulk import
  - name: ai
    description: AI Copilot — read-only pipeline analyst
  - name: diligence
    description: Due diligence workstream management
  - name: documents
    description: Deal Document Vault
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /targets:
    get:
      operationId: listTargets
      tags: [targets]
      summary: List all deal targets
      parameters:
        - name: sector
          in: query
          schema:
            type: string
        - name: priorityTier
          in: query
          schema:
            type: string
        - name: stage
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: owner
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: needsAttention
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of targets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Target"
    post:
      operationId: createTarget
      tags: [targets]
      summary: Create a new deal target
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTargetBody"
      responses:
        "201":
          description: Target created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Target"

  /targets/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Executive dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /targets/by-stage:
    get:
      operationId: getTargetsByStage
      tags: [dashboard]
      summary: Targets grouped by pipeline stage
      responses:
        "200":
          description: Stage breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StageCount"

  /targets/top-priority:
    get:
      operationId: getTopPriorityTargets
      tags: [dashboard]
      summary: Top priority-scored targets
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Top targets by priority score
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Target"

  /targets/filter-options:
    get:
      operationId: getTargetFilterOptions
      tags: [targets]
      summary: Distinct owners and countries for filter dropdowns
      responses:
        "200":
          description: Filter options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterOptions"

  /targets/needs-attention:
    get:
      operationId: getTargetsNeedingAttention
      tags: [dashboard]
      summary: Active targets flagged as needing attention
      responses:
        "200":
          description: Needs-attention targets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NeedsAttentionTarget"

  /targets/{id}:
    get:
      operationId: getTarget
      tags: [targets]
      summary: Get a single target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Target detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetDetail"
        "404":
          description: Not found
    put:
      operationId: updateTarget
      tags: [targets]
      summary: Update a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTargetBody"
      responses:
        "200":
          description: Target updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Target"
    delete:
      operationId: deleteTarget
      tags: [targets]
      summary: Soft-delete a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /targets/{id}/stage:
    put:
      operationId: updateTargetStage
      tags: [targets]
      summary: Update pipeline stage (with audit log)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStageBody"
      responses:
        "200":
          description: Stage updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Target"

  /targets/{id}/stage-history:
    get:
      operationId: getStageHistory
      tags: [targets]
      summary: Audit trail of stage changes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stage change history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StageChange"

  /targets/{id}/interactions:
    get:
      operationId: listInteractions
      tags: [interactions]
      summary: List interactions for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Interactions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Interaction"
    post:
      operationId: createInteraction
      tags: [interactions]
      summary: Log an interaction for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInteractionBody"
      responses:
        "201":
          description: Interaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interaction"

  /interactions/{id}:
    put:
      operationId: updateInteraction
      tags: [interactions]
      summary: Update an existing interaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInteractionBody"
      responses:
        "200":
          description: Interaction updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interaction"
        "404":
          description: Not found
    delete:
      operationId: deleteInteraction
      tags: [interactions]
      summary: Delete an interaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /targets/{id}/actions:
    get:
      operationId: listActions
      tags: [actions]
      summary: List action items for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Action items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActionItem"
    post:
      operationId: createAction
      tags: [actions]
      summary: Create an action item for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActionBody"
      responses:
        "201":
          description: Action created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"

  /actions/{id}:
    put:
      operationId: updateAction
      tags: [actions]
      summary: Update an action item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActionBody"
      responses:
        "200":
          description: Action updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"
    delete:
      operationId: deleteAction
      tags: [actions]
      summary: Delete an action item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /actions/open:
    get:
      operationId: listOpenActions
      tags: [actions]
      summary: List all open/overdue actions across all targets
      responses:
        "200":
          description: Open actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActionItem"

  /actions/command-center:
    get:
      operationId: listCommandCenterActions
      tags: [actions]
      summary: List all actions for the Action Command Center (open/blocked/in-progress + recently completed 14d)
      responses:
        "200":
          description: Command center actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommandCenterAction"

  /targets/{id}/diligence:
    get:
      operationId: getDiligenceForTarget
      tags: [diligence]
      summary: Get all diligence items for a target, grouped by workstream, with readiness score
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Diligence tab data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiligenceTabResponse"
    post:
      operationId: createDiligenceItem
      tags: [diligence]
      summary: Create a diligence item for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDiligenceItemBody"
      responses:
        "201":
          description: Diligence item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"

  /diligence/review:
    get:
      operationId: getDiligenceReview
      tags: [diligence]
      summary: Pipeline-wide diligence review — blocked, overdue, completion by target, recently completed
      responses:
        "200":
          description: Diligence review data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiligenceReviewResponse"

  /targets/{id}/documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all document records for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DealDocument"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Add a document record for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealDocument"

  /documents/review:
    get:
      operationId: getDocumentReview
      tags: [documents]
      summary: Pipeline-wide document review — missing critical, requested, under review, recently received/reviewed
      responses:
        "200":
          description: Document review data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentReviewResponse"

  /documents/{id}:
    put:
      operationId: updateDocument
      tags: [documents]
      summary: Update a document record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentBody"
      responses:
        "200":
          description: Document updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealDocument"
        "404":
          description: Not found

  /documents/{id}/download-url:
    get:
      operationId: getDocumentDownloadUrl
      tags: [documents]
      summary: Get a short-lived signed download URL for an uploaded document file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Signed URL response (storageEnabled false when secrets missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDownloadUrlResponse"
        "404":
          description: Document not found

  /review/weekly:
    get:
      operationId: getWeeklyReview
      tags: [review]
      summary: Weekly pipeline review — 8 sections computed server-side in one batch
      responses:
        "200":
          description: Weekly review data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyReviewResponse"

  /import/validate:
    post:
      operationId: validateImport
      tags: [import]
      summary: Validate parsed CSV/Excel rows before applying
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportValidateRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportValidateResult"

  /ai/ask:
    post:
      operationId: askAi
      tags: [ai]
      summary: Ask the AI Copilot a question about the pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiAskRequest"
      responses:
        "200":
          description: AI answer or setup-required response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAskResponse"

  /import/apply:
    post:
      operationId: applyImport
      tags: [import]
      summary: Apply a validated import (create + update targets)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportApplyRequest"
      responses:
        "200":
          description: Apply result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportApplyResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Target:
      type: object
      properties:
        id:
          type: integer
        targetCode:
          type: string
        projectName:
          type: string
        legalName:
          type: string
          nullable: true
        businessUnit:
          type: string
          nullable: true
        sector:
          type: string
          nullable: true
        subsector:
          type: string
          nullable: true
        geographyRegion:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        sourcingChannel:
          type: string
          nullable: true
        sourcingFirm:
          type: string
          nullable: true
        dealOwner:
          type: string
          nullable: true
        dealChampion:
          type: string
          nullable: true
        executiveSponsor:
          type: string
          nullable: true
        priorityTier:
          type: string
        strategicRationale:
          type: string
          nullable: true
        strategicFitScore:
          type: integer
        synergyScore:
          type: integer
        financialAttractivenessScore:
          type: integer
        processMaturityScore:
          type: integer
        riskPenaltyScore:
          type: integer
        priorityScore:
          type: integer
        currentStage:
          type: string
        isActive:
          type: boolean
        isConfidential:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        openActionCount:
          type: integer
          nullable: true
        overdueActionCount:
          type: integer
          nullable: true
        lastInteractionDate:
          type: string
          format: date-time
          nullable: true
        needsAttention:
          type: boolean
          nullable: true
      required:
        - id
        - targetCode
        - projectName
        - priorityTier
        - strategicFitScore
        - synergyScore
        - financialAttractivenessScore
        - processMaturityScore
        - riskPenaltyScore
        - priorityScore
        - currentStage
        - isActive
        - isConfidential
        - createdAt
        - updatedAt

    TargetDetail:
      allOf:
        - $ref: "#/components/schemas/Target"
        - type: object
          properties:
            interactions:
              type: array
              items:
                $ref: "#/components/schemas/Interaction"
            actions:
              type: array
              items:
                $ref: "#/components/schemas/ActionItem"
            stageHistory:
              type: array
              items:
                $ref: "#/components/schemas/StageChange"
          required: [interactions, actions, stageHistory]

    CreateTargetBody:
      type: object
      properties:
        targetCode:
          type: string
        projectName:
          type: string
        legalName:
          type: string
          nullable: true
        businessUnit:
          type: string
          nullable: true
        sector:
          type: string
          nullable: true
        subsector:
          type: string
          nullable: true
        geographyRegion:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        sourcingChannel:
          type: string
          nullable: true
        sourcingFirm:
          type: string
          nullable: true
        dealOwner:
          type: string
          nullable: true
        dealChampion:
          type: string
          nullable: true
        executiveSponsor:
          type: string
          nullable: true
        priorityTier:
          type: string
          default: Watchlist
        strategicRationale:
          type: string
          nullable: true
        strategicFitScore:
          type: integer
          default: 50
        synergyScore:
          type: integer
          default: 50
        financialAttractivenessScore:
          type: integer
          default: 50
        processMaturityScore:
          type: integer
          default: 50
        riskPenaltyScore:
          type: integer
          default: 0
        isConfidential:
          type: boolean
          default: true
      required: [targetCode, projectName]

    UpdateTargetBody:
      type: object
      properties:
        projectName:
          type: string
        legalName:
          type: string
          nullable: true
        businessUnit:
          type: string
          nullable: true
        sector:
          type: string
          nullable: true
        subsector:
          type: string
          nullable: true
        geographyRegion:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        sourcingChannel:
          type: string
          nullable: true
        sourcingFirm:
          type: string
          nullable: true
        dealOwner:
          type: string
          nullable: true
        dealChampion:
          type: string
          nullable: true
        executiveSponsor:
          type: string
          nullable: true
        priorityTier:
          type: string
        strategicRationale:
          type: string
          nullable: true
        strategicFitScore:
          type: integer
        synergyScore:
          type: integer
        financialAttractivenessScore:
          type: integer
        processMaturityScore:
          type: integer
        riskPenaltyScore:
          type: integer
        isActive:
          type: boolean
        isConfidential:
          type: boolean

    UpdateStageBody:
      type: object
      properties:
        newStage:
          type: string
        changedBy:
          type: string
          nullable: true
        changeReason:
          type: string
          nullable: true
      required: [newStage]

    StageChange:
      type: object
      properties:
        id:
          type: integer
        targetId:
          type: integer
        previousStage:
          type: string
          nullable: true
        newStage:
          type: string
        changedBy:
          type: string
          nullable: true
        changeReason:
          type: string
          nullable: true
        changedAt:
          type: string
          format: date-time
      required: [id, targetId, newStage, changedAt]

    Interaction:
      type: object
      properties:
        id:
          type: integer
        targetId:
          type: integer
        interactionType:
          type: string
        interactionDatetime:
          type: string
          format: date-time
        participantsInternal:
          type: string
          nullable: true
        participantsExternal:
          type: string
          nullable: true
        summary:
          type: string
        sentiment:
          type: string
          nullable: true
        promoterWillingness:
          type: string
          nullable: true
        valuationSignal:
          type: string
          nullable: true
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, targetId, interactionType, interactionDatetime, summary, createdAt]

    CreateInteractionBody:
      type: object
      properties:
        interactionType:
          type: string
        summary:
          type: string
        participantsInternal:
          type: string
          nullable: true
        participantsExternal:
          type: string
          nullable: true
        sentiment:
          type: string
          nullable: true
        promoterWillingness:
          type: string
          nullable: true
        valuationSignal:
          type: string
          nullable: true
        createdBy:
          type: string
          nullable: true
        interactionDatetime:
          type: string
          format: date-time
          nullable: true
      required: [interactionType, summary]

    UpdateInteractionBody:
      type: object
      properties:
        interactionType:
          type: string
        summary:
          type: string
        participantsInternal:
          type: string
          nullable: true
        participantsExternal:
          type: string
          nullable: true
        sentiment:
          type: string
          nullable: true
        promoterWillingness:
          type: string
          nullable: true
        valuationSignal:
          type: string
          nullable: true
        interactionDatetime:
          type: string
          format: date-time
          nullable: true

    EvidenceLink:
      type: object
      properties:
        label:
          type: string
        url:
          type: string
      required: [label, url]

    ActionItem:
      type: object
      properties:
        id:
          type: integer
        targetId:
          type: integer
        interactionId:
          type: integer
          nullable: true
        description:
          type: string
        owner:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        priority:
          type: string
        status:
          type: string
        targetName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        workstream:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        evidenceLinks:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/EvidenceLink"
      required: [id, targetId, description, priority, status, createdAt]

    CreateActionBody:
      type: object
      properties:
        description:
          type: string
        owner:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        priority:
          type: string
          default: Medium
        interactionId:
          type: integer
          nullable: true
        workstream:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required: [description]

    UpdateActionBody:
      type: object
      properties:
        description:
          type: string
        owner:
          type: string
