openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Inorganic Growth OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: targets
    description: Deal target operations
  - name: interactions
    description: Interaction log operations
  - name: actions
    description: Action item operations
  - name: dashboard
    description: Dashboard and analytics
  - name: import
    description: CSV / Excel bulk import
  - name: ai
    description: AI Copilot — read-only pipeline analyst
  - name: diligence
    description: Due diligence workstream management
  - name: documents
    description: Deal Document Vault
  - name: ic
    description: Investment Committee session log
  - name: analytics
    description: Pipeline analytics — funnel, time-in-stage, win/loss, origination
  - name: valuation
    description: Valuation log and deal economics
  - name: synergies
  - name: advisors
  - name: sponsors
  - name: compliance
    description: NDA register and regulatory clearance tracking
  - name: audit
    description: Tamper-evident append-only audit log with hash-chain verification
  - name: doctrine
    description: Learning loop — deal closure verdicts and accuracy analysis
  - name: auth
    description: Authentication — Email OTP login, OIDC SSO stub, session logout
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /targets:
    get:
      operationId: listTargets
      tags: [targets]
      summary: List all deal targets
      parameters:
        - name: sector
          in: query
          schema:
            type: string
        - name: priorityTier
          in: query
          schema:
            type: string
        - name: stage
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: owner
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: needsAttention
          in: query
          schema:
            type: boolean
        - name: dealType
          in: query
          schema:
            type: string
        - name: myDeals
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of targets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Target"
    post:
      operationId: createTarget
      tags: [targets]
      summary: Create a new deal target
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTargetBody"
      responses:
        "201":
          description: Target created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Target"

  /targets/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Executive dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /targets/velocity:
    get:
      operationId: getDashboardVelocity
      tags: [dashboard]
      summary: New deal counts per week for the last 8 weeks
      responses:
        "200":
          description: Velocity data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VelocityWeek"

  /targets/by-stage:
    get:
      operationId: getTargetsByStage
      tags: [dashboard]
      summary: Targets grouped by pipeline stage
      responses:
        "200":
          description: Stage breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StageCount"

  /targets/top-priority:
    get:
      operationId: getTopPriorityTargets
      tags: [dashboard]
      summary: Top priority-scored targets
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Top targets by priority score
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Target"

  /targets/filter-options:
    get:
      operationId: getTargetFilterOptions
      tags: [targets]
      summary: Distinct owners and countries for filter dropdowns
      responses:
        "200":
          description: Filter options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterOptions"

  /targets/needs-attention:
    get:
      operationId: getTargetsNeedingAttention
      tags: [dashboard]
      summary: Active targets flagged as needing attention
      responses:
        "200":
          description: Needs-attention targets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NeedsAttentionTarget"

  /targets/reorder:
    put:
      operationId: reorderTargets
      tags: [targets]
      summary: Batch-update kanban sort order within a stage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KanbanReorderBody"
      responses:
        "200":
          description: Number of targets updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KanbanReorderResult"

  /targets/{id}:
    get:
      operationId: getTarget
      tags: [targets]
      summary: Get a single target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Target detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetDetail"
        "404":
          description: Not found
    put:
      operationId: updateTarget
      tags: [targets]
      summary: Update a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTargetBody"
      responses:
        "200":
          description: Target updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Target"
    delete:
      operationId: deleteTarget
      tags: [targets]
      summary: Soft-delete a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /targets/{id}/stage-gate:
    get:
      operationId: getStageGate
      tags: [targets]
      summary: Advisory pre-flight gate check for a proposed stage transition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: newStage
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Gate check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StageGateCheckResponse"
        "400":
          description: Missing newStage param
        "404":
          description: Target not found

  /targets/{id}/stage:
    put:
      operationId: updateTargetStage
      tags: [targets]
      summary: Update pipeline stage (with audit log and advisory gate warnings)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStageBody"
      responses:
        "200":
          description: Stage updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StageUpdateResponse"

  /targets/{id}/stage-history:
    get:
      operationId: getStageHistory
      tags: [targets]
      summary: Audit trail of stage changes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stage change history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StageChange"

  /targets/{id}/interactions:
    get:
      operationId: listInteractions
      tags: [interactions]
      summary: List interactions for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Interactions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Interaction"
    post:
      operationId: createInteraction
      tags: [interactions]
      summary: Log an interaction for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInteractionBody"
      responses:
        "201":
          description: Interaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interaction"

  /interactions/{id}:
    put:
      operationId: updateInteraction
      tags: [interactions]
      summary: Update an existing interaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInteractionBody"
      responses:
        "200":
          description: Interaction updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interaction"
        "404":
          description: Not found
    delete:
      operationId: deleteInteraction
      tags: [interactions]
      summary: Delete an interaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /targets/{id}/actions:
    get:
      operationId: listActions
      tags: [actions]
      summary: List action items for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Action items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActionItem"
    post:
      operationId: createAction
      tags: [actions]
      summary: Create an action item for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActionBody"
      responses:
        "201":
          description: Action created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"

  /actions/{id}:
    put:
      operationId: updateAction
      tags: [actions]
      summary: Update an action item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActionBody"
      responses:
        "200":
          description: Action updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"
    delete:
      operationId: deleteAction
      tags: [actions]
      summary: Delete an action item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /actions/open:
    get:
      operationId: listOpenActions
      tags: [actions]
      summary: List all open/overdue actions across all targets
      responses:
        "200":
          description: Open actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActionItem"

  /actions/command-center:
    get:
      operationId: listCommandCenterActions
      tags: [actions]
      summary: List all actions for the Action Command Center (open/blocked/in-progress + recently completed 14d)
      parameters:
        - name: mine
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Command center actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommandCenterAction"

  /targets/{id}/diligence:
    get:
      operationId: getDiligenceForTarget
      tags: [diligence]
      summary: Get all diligence items for a target, grouped by workstream, with readiness score
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Diligence tab data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiligenceTabResponse"
    post:
      operationId: createDiligenceItem
      tags: [diligence]
      summary: Create a diligence item for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDiligenceItemBody"
      responses:
        "201":
          description: Diligence item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"

  /diligence/review:
    get:
      operationId: getDiligenceReview
      tags: [diligence]
      summary: Pipeline-wide diligence review — blocked, overdue, completion by target, recently completed
      parameters:
        - name: dealType
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Diligence review data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiligenceReviewResponse"

  /targets/{id}/ic-sessions:
    get:
      operationId: listIcSessions
      tags: [ic]
      summary: List IC sessions for a target (most recent first)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: IC sessions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IcSession"
    post:
      operationId: createIcSession
      tags: [ic]
      summary: Create an IC session record for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIcSessionBody"
      responses:
        "201":
          description: IC session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IcSession"

  /ic-sessions/{id}:
    delete:
      operationId: deleteIcSession
      tags: [ic]
      summary: Delete an IC session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /targets/{id}/ic-proposals:
    get:
      operationId: listIcProposals
      tags: [ic]
      summary: List IC proposals for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: IC proposals list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IcProposal"
    post:
      operationId: createIcProposal
      tags: [ic]
      summary: Submit a new IC proposal for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIcProposalBody"
      responses:
        "201":
          description: IC proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IcProposal"

  /ic-proposals/{id}:
    get:
      operationId: getIcProposal
      tags: [ic]
      summary: Get IC proposal detail with votes and CPs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: IC proposal detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IcProposalDetail"
        "404":
          description: Not found

  /ic-proposals/{id}/voters:
    post:
      operationId: addIcVoter
      tags: [ic]
      summary: Add a voter to an IC proposal (creates pending vote record)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddIcVoterBody"
      responses:
        "201":
          description: Voter added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IcVote"

  /ic-votes/{id}/cast:
    post:
      operationId: castIcVote
      tags: [ic]
      summary: Cast a vote on an IC proposal (immutable after casting)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CastIcVoteBody"
      responses:
        "200":
          description: Vote cast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IcVote"
        "400":
          description: Vote already cast or invalid
        "404":
          description: Not found

  /ic-proposals/{id}/resolve:
    post:
      operationId: resolveIcProposal
      tags: [ic]
      summary: Compute and lock the outcome of an IC proposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Proposal resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IcProposalDetail"
        "400":
          description: Already resolved
        "404":
          description: Not found

  /ic-proposals/{id}/cps:
    get:
      operationId: listIcCps
      tags: [ic]
      summary: List conditions precedent for an IC proposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: CP list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IcCp"

  /ic-cps/{cpId}:
    put:
      operationId: updateIcCp
      tags: [ic]
      summary: Update a conditions precedent item (close, set owner/date)
      parameters:
        - name: cpId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIcCpBody"
      responses:
        "200":
          description: CP updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IcCp"
        "404":
          description: Not found

  /analytics/funnel:
    get:
      operationId: getAnalyticsFunnel
      tags: [analytics]
      summary: Pipeline funnel — deals entered vs currently active at each stage with stage-to-stage conversion rate
      parameters:
        - name: dealType
          in: query
          schema:
            type: string
        - name: sector
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Funnel data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FunnelStageItem"

  /analytics/time-in-stage:
    get:
      operationId: getAnalyticsTimeInStage
      tags: [analytics]
      summary: Dwell time per stage (historical avg/median) plus current deal aging list
      parameters:
        - name: dealType
          in: query
          schema:
            type: string
        - name: sector
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Time-in-stage data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeInStageResponse"

  /analytics/win-loss:
    get:
      operationId: getAnalyticsWinLoss
      tags: [analytics]
      summary: Win/loss breakdown over trailing 12 months — outcomes, drop reasons, sector breakdown
      parameters:
        - name: dealType
          in: query
          schema:
            type: string
        - name: sector
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Win/loss analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WinLossResponse"

  /analytics/origination:
    get:
      operationId: getAnalyticsOrigination
      tags: [analytics]
      summary: Deal origination by sourcing channel — volume and win rate
      parameters:
        - name: dealType
          in: query
          schema:
            type: string
        - name: sector
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Origination channel data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OriginationChannelItem"

  /targets/{id}/synergies:
    get:
      operationId: listSynergies
      tags: [synergies]
      summary: List synergy hypotheses for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Synergy list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Synergy"
    post:
      operationId: createSynergy
      tags: [synergies]
      summary: Add a synergy hypothesis for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSynergyBody"
      responses:
        "201":
          description: Synergy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Synergy"

  /synergies/{id}:
    put:
      operationId: updateSynergy
      tags: [synergies]
      summary: Update a synergy hypothesis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSynergyBody"
      responses:
        "200":
          description: Updated synergy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Synergy"
    delete:
      operationId: deleteSynergy
      tags: [synergies]
      summary: Delete a synergy hypothesis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /targets/{id}/valuations:
    get:
      operationId: listValuations
      tags: [valuation]
      summary: List valuation entries for a target (most recent first)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Valuation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Valuation"
    post:
      operationId: createValuation
      tags: [valuation]
      summary: Add a valuation entry for a target
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateValuationBody"
      responses:
        "201":
          description: Valuation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Valuation"

  /valuations/{id}:
    delete:
      operationId: deleteValuation
      tags: [valuation]
      summary: Delete a valuation entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /targets/{id}/economics:
    get:
      operationId: getDealEconomics
      tags: [valuation]
      summary: Get consideration structure and returns for a target
      parameters:
        - name: id
          in: path
