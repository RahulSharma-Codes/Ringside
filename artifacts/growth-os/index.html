<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Ringside</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Non-blocking font load — never delays first paint -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>

    <!-- Instant loading shell — paints from first TCP packet before any JS runs -->
    <style id="shell-css">
      #app-shell {
        position: fixed; inset: 0; z-index: 9999;
        display: flex;
        background: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        transition: opacity 0.25s ease;
      }
      #app-shell.shell-hiding { opacity: 0; pointer-events: none; }
      .sh-rail {
        width: 56px; flex-shrink: 0;
        background: hsl(222 47% 11%);
        border-radius: 0 14px 14px 0;
        margin: 8px 0 8px 8px;
      }
      .sh-main {
        flex: 1; padding: 28px 40px;
        display: flex; flex-direction: column; gap: 16px;
        overflow: hidden;
      }
      .sh-row { display: flex; gap: 12px; }
      .sh-block {
        border-radius: 10px;
        background: linear-gradient(90deg, #e2e8f0 0%, #f1f5f9 50%, #e2e8f0 100%);
        background-size: 400% 100%;
        animation: sh-shimmer 1.6s ease-in-out infinite;
        flex-shrink: 0;
      }
      @keyframes sh-shimmer {
        0%   { background-position: 100% 0; }
        100% { background-position: -100% 0; }
      }
      .sh-block:nth-child(2) { animation-delay: 0.1s; }
      .sh-block:nth-child(3) { animation-delay: 0.2s; }
      .sh-block:nth-child(4) { animation-delay: 0.3s; }
    </style>
    <script>
      // Apply dark skeleton immediately if user prefers dark mode
      (function() {
        try {
          var t = localStorage.getItem('ringside-theme-v2');
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
            var s = document.getElementById('shell-css');
            if (s) {
              s.textContent = s.textContent
                .replace('#f8fafc', '#0f172a')
                .replace('#e2e8f0', '#1e293b')
                .replace('#f1f5f9', '#334155');
            }
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <!-- Loading skeleton — removed by React once it mounts -->
    <div id="app-shell" aria-hidden="true">
      <div class="sh-rail"></div>
      <div class="sh-main">
        <div class="sh-row">
          <div class="sh-block" style="height:32px;width:160px"></div>
        </div>
        <div class="sh-row">
          <div class="sh-block" style="height:96px;flex:1"></div>
          <div class="sh-block" style="height:96px;flex:1"></div>
          <div class="sh-block" style="height:96px;flex:1"></div>
          <div class="sh-block" style="height:96px;flex:1"></div>
        </div>
        <div class="sh-row">
          <div class="sh-block" style="height:200px;flex:2"></div>
          <div class="sh-block" style="height:200px;flex:1"></div>
        </div>
        <div class="sh-row">
          <div class="sh-block" style="height:120px;flex:1"></div>
        </div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Fade out and remove skeleton once React has rendered into #root
      (function() {
        var shell = document.getElementById('app-shell');
        if (!shell) return;
        var root = document.getElementById('root');
        var observer = new MutationObserver(function() {
          if (root && root.firstChild) {
            shell.classList.add('shell-hiding');
            setTimeout(function() {
              shell.remove();
              var css = document.getElementById('shell-css');
              if (css) css.remove();
            }, 280);
            observer.disconnect();
          }
        });
        observer.observe(root, { childList: true });
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
